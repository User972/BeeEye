name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore BeeEye.slnx
      - run: dotnet build BeeEye.slnx -c Release --no-restore
      - run: dotnet test BeeEye.slnx -c Release --no-build --verbosity normal

  web:
    name: Web (React/TS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test

  ml:
    name: ML (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev]"
      - run: pytest

  infra:
    name: Infra (Bicep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Bicep
        run: az bicep build --file infra/main.bicep

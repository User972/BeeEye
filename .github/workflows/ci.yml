name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend (.NET · unit/arch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore BeeEye.slnx
      - run: dotnet build BeeEye.slnx -c Release --no-restore
      # Fast suite: unit, analytics and architecture tests. The Testcontainers
      # integration suite runs in its own job so a Docker outage or a slow
      # container pull never blocks the fast feedback path.
      - run: >
          dotnet test BeeEye.slnx -c Release --no-build --verbosity normal
          --filter "FullyQualifiedName!~BeeEye.IntegrationTests"

  integration:
    name: Backend (.NET · integration)
    runs-on: ubuntu-latest # provides a Docker daemon for Testcontainers
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: >
          dotnet test tests/integration/BeeEye.IntegrationTests/BeeEye.IntegrationTests.csproj
          -c Release --verbosity normal

  web:
    name: Web (React/TS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      # Runs the full vitest suite and enforces the coverage floor (V3-QA-004); the floor can only
      # ratchet up, never down.
      - run: npm run test:coverage
      - name: Upload web coverage (lcov)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: src/web/coverage/lcov.info
          if-no-files-found: warn

  e2e:
    name: Web E2E · a11y · visual (Playwright)
    runs-on: ubuntu-latest # provides a Docker daemon for the seeded Postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/web/package-lock.json
      # The sample data is embedded and idempotent by checksum, so a seeded Postgres makes every
      # journey deterministic (V3-QA-001 / B.7). Azurite comes up with it via the repo compose file.
      - name: Start seeded Postgres + Azurite
        run: docker compose up -d
      # Pre-build the API so the Playwright webServer's `dotnet run` starts within its timeout.
      - name: Restore & build the API
        run: |
          dotnet restore BeeEye.slnx
          dotnet build src/api/BeeEye.Api/BeeEye.Api.csproj -c Release --no-restore
      - name: Install web deps
        working-directory: src/web
        run: npm ci
      - name: Install Playwright browser
        working-directory: src/web
        run: npx playwright install --with-deps chromium
      # Functional + accessibility gate. Playwright's webServer boots the API (LocalDev, waits on
      # /health/ready so the seed is present) and the built SPA in local mode. Excludes @visual, which
      # needs committed platform-pinned baselines (see the web README for the one-time bootstrap).
      - name: E2E + accessibility
        working-directory: src/web
        env:
          ASPNETCORE_ENVIRONMENT: Development
          POSTGRES_HOST: localhost
          POSTGRES_PORT: '5432'
          POSTGRES_DB: beeeye
          POSTGRES_USER: beeeye
          POSTGRES_PASSWORD: beeeye_local_dev_only
        run: npm run e2e -- --grep-invert @visual
      # Visual-regression gate. Fails on any unreviewed pixel change (or missing baseline) — mirroring
      # the OpenAPI drift-gate philosophy. Baselines are generated in this same runner via
      # `npm run e2e:update` and committed; until then this step is the tracked bootstrap.
      - name: Visual regression
        working-directory: src/web
        env:
          ASPNETCORE_ENVIRONMENT: Development
          POSTGRES_HOST: localhost
          POSTGRES_PORT: '5432'
          POSTGRES_DB: beeeye
          POSTGRES_USER: beeeye
          POSTGRES_PASSWORD: beeeye_local_dev_only
        run: npm run e2e -- --grep @visual
      - name: Upload Playwright report, traces and visual diffs
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            src/web/playwright-report
            src/web/test-results
          if-no-files-found: ignore

  openapi:
    name: OpenAPI contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/web/package-lock.json
      - run: dotnet build src/api/BeeEye.Api/BeeEye.Api.csproj -c Release
      # Serve the OpenAPI document (Program.cs maps /openapi/v1.json in Development)
      # and capture it. No database is needed — startup DB init is best-effort.
      - name: Export OpenAPI document
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ASPNETCORE_URLS: http://localhost:5080
          Database__AutoMigrateAndSeed: 'false'
        run: |
          dotnet run --project src/api/BeeEye.Api/BeeEye.Api.csproj --no-build -c Release &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5080/openapi/v1.json -o src/web/openapi/openapi.json; then
              echo "OpenAPI document captured after ${i}s"; break
            fi
            sleep 1
          done
          test -s src/web/openapi/openapi.json
      # The exported document overwrites the COMMITTED contract snapshot; any
      # difference means the API surface changed without the snapshot being
      # deliberately regenerated and committed — that is contract drift, fail.
      - name: Fail on contract drift against the committed snapshot
        run: |
          # git diff exits 0 for an untracked file — assert the snapshot is tracked
          # first, or the gate would be silently inert.
          if ! git ls-files --error-unmatch src/web/openapi/openapi.json >/dev/null 2>&1; then
            echo "::error::src/web/openapi/openapi.json is not tracked — commit the contract snapshot or the drift gate protects nothing."
            exit 1
          fi
          if ! git diff --exit-code -- src/web/openapi/openapi.json; then
            echo "::error::OpenAPI contract drift — the API's endpoints or DTOs changed but src/web/openapi/openapi.json was not regenerated. Re-export the document (see src/web/openapi/README.md) and commit it with the API change."
            exit 1
          fi
      # Assert the published contract is well-formed and exposes the wired
      # bounded-context endpoints, then prove it is consumable by the typed client.
      - name: Validate contract and regenerate types
        working-directory: src/web
        run: |
          node -e "const d=require('./openapi/openapi.json'); const p=Object.keys(d.paths||{}); for (const want of ['/api/v1/forecasting','/api/v1/inventory','/api/v1/platform/modules']) { if(!p.some(k=>k.startsWith(want))) throw new Error('OpenAPI contract missing '+want); } console.log('contract OK —', p.length, 'paths');"
          npm ci
          npm run gen:api

  ml:
    name: ML (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev]"
      - run: pytest

  infra:
    name: Infra (Bicep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Bicep
        run: az bicep build --file infra/main.bicep

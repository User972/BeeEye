# TEMPORARY — one-time bootstrap of the platform-pinned Linux visual baselines (S12 @visual gate).
#
# toHaveScreenshot baselines are OS/browser-pinned via the {platform} segment of
# snapshotPathTemplate. CI runs on ubuntu-latest, and none are committed yet, so the ci.yml `e2e`
# job's @visual step is red by design until Linux baselines exist. This job generates them IN the
# same ubuntu-latest image the e2e job uses — the only way to guarantee they byte-match the runner
# that verifies them — then commits them back to the branch. Delete this workflow once the baselines
# are committed; the standing gate lives in ci.yml.
name: visual-baselines-bootstrap

on:
  push:
    branches: ['claude/s12-linux-visual-baselines-1ma3u7']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  baselines:
    name: Generate + commit Linux visual baselines
    runs-on: ubuntu-latest # same image as ci.yml `e2e`, so the {platform}-pinned baselines match
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 'claude/s12-linux-visual-baselines-1ma3u7'
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/web/package-lock.json
      # Seeded Postgres + Azurite — identical to the ci.yml e2e job, so every journey is deterministic.
      - name: Start seeded Postgres + Azurite
        run: docker compose up -d
      # Pre-build the API so the Playwright webServer's `dotnet run` starts within its timeout.
      - name: Restore & build the API
        run: |
          dotnet restore BeeEye.slnx
          dotnet build src/api/BeeEye.Api/BeeEye.Api.csproj -c Release --no-restore
      - name: Install web deps
        working-directory: src/web
        run: npm ci
      - name: Install Playwright browser
        working-directory: src/web
        run: npx playwright install --with-deps chromium
      # Boots the API (LocalDev, waits on /health/ready) + built SPA and writes the @visual baselines:
      # 11 screens x 7 viewports x 2 themes = 154 files under e2e/__screenshots__/*-linux.png.
      - name: Generate visual baselines (--update-snapshots)
        working-directory: src/web
        env:
          ASPNETCORE_ENVIRONMENT: Development
          POSTGRES_HOST: localhost
          POSTGRES_PORT: '5432'
          POSTGRES_DB: beeeye
          POSTGRES_USER: beeeye
          POSTGRES_PASSWORD: beeeye_local_dev_only
        run: npm run e2e:update
      # Fail loudly on a partial generation rather than committing an incomplete baseline set.
      - name: Verify baseline count (expect 154)
        working-directory: src/web
        run: |
          count=$(find e2e/__screenshots__ -type f -name '*-linux.png' | wc -l)
          echo "Generated ${count} Linux baselines"
          test "${count}" -eq 154
      # Fallback: keep the baselines retrievable even if the commit/push step is blocked.
      - name: Upload baselines artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: visual-baselines-linux
          path: src/web/e2e/__screenshots__
          if-no-files-found: error
      - name: Commit & push baselines
        run: |
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"
          git add src/web/e2e/__screenshots__
          if git diff --cached --quiet; then
            echo "No baseline changes to commit"; exit 0
          fi
          git commit \
            -m "test(e2e): add platform-pinned Linux visual baselines (S12 @visual gate)" \
            -m "Generated in the CI ubuntu-latest runner (the same image as the ci.yml e2e job) so the {platform}-pinned toHaveScreenshot baselines byte-match the environment that verifies them. 11 screens x 7 viewports x 2 themes = 154 baselines under src/web/e2e/__screenshots__/visual.spec.ts/*-linux.png. Bootstrap only; the standing visual-regression gate lives in ci.yml." \
            -m "Co-Authored-By: Claude Opus 4.8 (1M context) <noreply@anthropic.com>"
          git push origin HEAD:refs/heads/claude/s12-linux-visual-baselines-1ma3u7
